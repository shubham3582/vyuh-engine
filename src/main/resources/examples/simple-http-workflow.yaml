workflowName: simple-http-workflow
version: "1.0"

services:
  validation-service:
    name: validation-service
    protocol: HTTP
    url: http://httpbin.org
    path: /post
    method: POST
    openapiSpec: openapi/validation-service.yaml
    operationId: validatePayment
    timeout: 10000
    retries: 2
    async: false
    headers:
      Content-Type: application/json

steps:
  validate-payment:
    id: validate-payment
    serviceName: validation-service
    inputMapping:
      amount: amount
      currency: currency
      customerId: customerId
    outputMapping:
      requestId: json.id
      originalAmount: json.amount
    nextSteps:
      - process-payment
    timeout: 10000
    async: false

  process-payment:
    id: process-payment
    serviceName: validation-service
    inputMapping:
      requestId: requestId
      amount: originalAmount
      currency: currency
    outputMapping:
      processedAmount: json.amount
      processedCurrency: json.currency
    nextSteps: []
    timeout: 10000
    async: false

startStep: validate-payment
globalTimeout: 60000
globalRetries: 1

context:
  workflowType: simple_http
  environment: demo

errorHandler:
  REQUEST_ERROR: validate-payment
